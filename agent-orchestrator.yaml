port: 3001
defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: []
projects:
  BetterCallZaal:
    name: BetterCallZaal
    sessionPrefix: bcz
    repo: bettercallzaal/bettercallzaalwebsite
    path: /Users/zaalpanthaki/Documents/BetterCallZaal
    defaultBranch: main
    agentRules: |-
      Always run tests before pushing.
      Use conventional commits (feat:, fix:, chore:, docs:, refactor:, test:).
      Link issue numbers in commit messages.
      Write clear commit messages that explain WHY, not just WHAT.
